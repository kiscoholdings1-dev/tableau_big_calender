<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조회기간 설정</title>

  <link rel="stylesheet" href="./styles.css?v=20260305_20" />
</head>

<body class="cfgPage">
  <div class="cfgPageWrap">
    <div class="cfgHeader">
      <div class="cfgTitle">대시보드 날짜 파라미터 매핑</div>
      <div class="cfgSub" id="cfgDashName">-</div>
    </div>

    <div class="cfgBody">
      <div class="cfgRow">
        <label class="cfgLabel" for="kind">유형</label>
        <select id="kind" class="cfgSelect">
          <option value="range">기간(시작~종료)</option>
          <option value="single">단일 날짜</option>
        </select>
      </div>

      <div class="cfgRow">
        <label class="cfgLabel" for="startParam">시작 파라미터</label>
        <select id="startParam" class="cfgSelect"></select>
      </div>

      <div class="cfgRow" id="rowEnd">
        <label class="cfgLabel" for="endParam">종료 파라미터</label>
        <select id="endParam" class="cfgSelect"></select>
      </div>

      <div class="cfgRow">
        <label class="cfgLabel" for="format">표시 포맷(Flatpickr)</label>
        <input id="format" class="cfgInput" type="text" placeholder="예: Y-m-d" />
      </div>

      <div class="cfgHint" id="cfgHint"></div>
    </div>

    <div class="cfgFooter">
      <button class="btn ghost" id="cancelBtn" type="button">닫기</button>
      <button class="btn primary" id="saveBtn" type="button">저장</button>
    </div>
  </div>

  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>
  <script src="./config.js?v=20260305_20"></script>
</body>
</html>
