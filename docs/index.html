<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조회기간</title>

  <link rel="stylesheet" href="./lib/flatpickr.min.css" />
  <link rel="stylesheet" href="./styles.css?v=20260306_05" />
</head>

<body>
  <div id="rangeBar" class="rangeBar">
    <div class="rangeLine">
      <span class="label">시작날짜</span>
      <span class="value dateValue" id="startText">-</span>

      <span class="sep">|</span>

      <span class="label">종료날짜</span>
      <span class="value dateValue" id="endText">-</span>
    </div>

    <div class="topActions">
      <button id="rangeModeBtn" class="miniBtn" type="button">기간변경</button>
      <button id="quickModeBtn" class="miniBtn" type="button">빠른조회</button>
      <button id="applyBtn" class="miniBtn" type="button">적용</button>
      <button id="settingsBtn" class="settingsBtn" type="button" aria-label="설정">⚙</button>
    </div>
  </div>

  <div id="quickHost" class="quickHost">
    <div class="quickBar">
      <button class="quickBtn" type="button" data-quick="today">금일</button>
      <button class="quickBtn" type="button" data-quick="thisWeek">금주 누계</button>
      <button class="quickBtn" type="button" data-quick="thisMonth">당월 누계</button>
      <button class="quickBtn" type="button" data-quick="ytd">연 누계</button>
    </div>
  </div>

  <div id="calHost" class="calHost"></div>

  <div id="cfgPanel" class="cfgPanel" aria-hidden="true">
    <div class="cfgHeader">
      <div class="cfgTitle">날짜 파라미터 매핑</div>
      <div class="cfgSub" id="cfgDashName">-</div>
    </div>

    <div class="cfgBody">
      <div class="cfgRow">
        <label class="cfgLabel" for="kind">유형</label>
        <select id="kind" class="cfgSelect">
          <option value="range">기간(시작~종료)</option>
          <option value="single">단일 날짜</option>
        </select>
      </div>

      <div class="cfgRow">
        <label class="cfgLabel" for="startParam">시작 파라미터</label>
        <select id="startParam" class="cfgSelect"></select>
      </div>

      <div class="cfgRow" id="rowEnd">
        <label class="cfgLabel" for="endParam">종료 파라미터</label>
        <select id="endParam" class="cfgSelect"></select>
      </div>

      <div class="cfgRow">
        <label class="cfgLabel" for="format">표시 포맷</label>
        <input id="format" class="cfgInput" type="text" placeholder="예: Y-m-d" />
      </div>

      <div class="cfgHint" id="cfgHint"></div>
    </div>

    <div class="cfgFooter">
      <button class="btn ghost" id="cfgCloseBtn" type="button">닫기</button>
      <button class="btn primary" id="cfgSaveBtn" type="button">저장</button>
    </div>
  </div>

  <input id="fpHidden" class="fpHidden" type="text" />
  <div id="hint" class="hint"></div>
  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="./lib/flatpickr.min.js"></script>
  <script src="https://extensions.tableauusercontent.com/resources/tableau.extensions.1.latest.min.js"></script>
  <script src="./main.js?v=20260306_05"></script>
</body>
</html>
